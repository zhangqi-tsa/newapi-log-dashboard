<h2>时间筛选功能</h2>
<p class="subtitle">统计数据的时间范围选择，你希望支持哪些？</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="today" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content">
      <h3>今日</h3>
      <p>当天的统计数据，适合查看实时使用情况</p>
    </div>
  </div>

  <div class="option" data-choice="week" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content">
      <h3>本周</h3>
      <p>最近7天，适合周报统计</p>
    </div>
  </div>

  <div class="option" data-choice="month" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content">
      <h3>本月</h3>
      <p>最近30天/当月，适合月度统计</p>
    </div>
  </div>

  <div class="option" data-choice="custom" onclick="toggleSelect(this)">
    <div class="letter">?</div>
    <div class="content">
      <h3>自定义日期范围</h3>
      <p>用户选择任意起止日期，灵活性最高</p>
    </div>
  </div>

  <div class="option" data-choice="all" onclick="toggleSelect(this)">
    <div class="letter">?</div>
    <div class="content">
      <h3>全部时间</h3>
      <p>不限制时间，展示所有历史数据</p>
    </div>
  </div>
</div>

<p style="margin-top:16px;color:#666">
  ✓ = 推荐必选 | ? = 可选<br>
  点击选择/取消选择（可多选）
</p>
