<h2>详细日志页面</h2>
<p class="subtitle">原始 API 调用日志列表，需要展示哪些信息？</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="time" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content">
      <h3>时间</h3>
      <p>API 调用发生的时间</p>
    </div>
  </div>

  <div class="option" data-choice="username" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content">
      <h3>AK 名称</h3>
      <p>调用的令牌名称，可点击跳转</p>
    </div>
  </div>

  <div class="option" data-choice="model" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content">
      <h3>模型名称</h3>
      <p>调用的模型</p>
    </div>
  </div>

  <div class="option" data-choice="tokens" onclick="toggleSelect(this)">
    <div class="letter">?</div>
    <div class="content">
      <h3>Tokens 详情</h3>
      <p>Prompt + Completion tokens 数量</p>
    </div>
  </div>

  <div class="option" data-choice="quota" onclick="toggleSelect(this)">
    <div class="letter">?</div>
    <div class="content">
      <h3>消耗额度</h3>
      <p>本次调用消耗的 quota</p>
    </div>
  </div>

  <div class="option" data-choice="channel" onclick="toggleSelect(this)">
    <div class="letter">?</div>
    <div class="content">
      <h3>渠道</h3>
      <p>API 转发的渠道名称</p>
    </div>
  </div>

  <div class="option" data-choice="stream" onclick="toggleSelect(this)">
    <div class="letter">?</div>
    <div class="content">
      <h3>流式输出</h3>
      <p>是否为 stream 模式调用</p>
    </div>
  </div>

  <div class="option" data-choice="usetime" onclick="toggleSelect(this)">
    <div class="letter">?</div>
    <div class="content">
      <h3>响应耗时</h3>
      <p>本次调用耗时（秒）</p>
    </div>
  </div>

  <div class="option" data-choice="status" onclick="toggleSelect(this)">
    <div class="letter">?</div>
    <div class="content">
      <h3>状态/类型</h3>
      <p>成功/失败，消费/错误日志</p>
    </div>
  </div>
</div>

<p style="margin-top:16px;color:#666">
  ✓ = 推荐必选 | ? = 可选<br>
  点击选择/取消选择（可多选）
</p>
